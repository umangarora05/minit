services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379" 
 # --- MICROSERVICES ---
  auth-service:
    # build: ./auth-service
    image: backend-auth-service
    container_name: minit-auth-service
    ports:
      - "5001:5001"
    env_file: .env
    depends_on:
      - redis
    restart: always

  order-service:
    # build: ./order-service
    image: backend-order-service
    container_name: minit-order-service
    ports:
      - "5002:5002"
    env_file: .env
    depends_on:
      - kafka
      - redis
    restart: always

  inventory-service:
    # build: ./inventory-service
    image: backend-inventory-service
    container_name: minit-inventory-service
    ports:
      - "5003:5003"
    env_file: .env
    depends_on:
      - kafka
    restart: always

  delivery-service:
    # build: ./delivery-service
    image: backend-delivery-service
    container_name: minit-delivery-service
    ports:
      - "5004:5004"
    env_file: .env
    depends_on:
      - kafka
    restart: always

  payment-service:
    # build: ./payment-service
    image: backend-payment-service
    container_name: minit-payment-service
    ports:
      - "5005:5005"
    env_file: .env
    depends_on:
      - kafka
    restart: always

  admin-service:
    # build: ./admin-service
    image: backend-admin-service
    container_name: minit-admin-service
    ports:
      - "5006:5006"
    env_file: .env
    depends_on:
      - auth-service
    restart: always

  gateway-service:
    # build: ./gateway-service
    image: backend-gateway-service
    container_name: minit-gateway-service
    ports:
      - "5000:5000"
    restart: always

